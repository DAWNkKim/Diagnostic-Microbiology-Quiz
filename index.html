<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임상미생물학 Ch.5 전공 퀴즈 (전체 85문항)</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f5f6fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary); color: white; width: 100%; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .setup { background: white; width: 90%; max-width: 700px; padding: 15px; margin-top: 15px; border-radius: 12px; display: flex; gap: 10px; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .quiz-card { background: white; width: 90%; max-width: 700px; padding: 30px; margin-top: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; }
        .q-text { font-size: 1.1rem; font-weight: bold; line-height: 1.6; margin-bottom: 25px; white-space: pre-wrap; }
        .opt-btn { width: 100%; text-align: left; padding: 16px; margin-bottom: 12px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
        .opt-btn:hover { border-color: var(--accent); background: #f1f9ff; }
        .opt-btn.correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .opt-btn.wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
        #next-btn { display: none; width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        select, button.start-btn { padding: 10px 20px; border-radius: 6px; border: 1px solid #ddd; font-size: 1rem; }
        button.start-btn { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>🔬 Microbiology Ch.5: Role of Microscopy (Full Exam)</header>

<div class="setup">
    <select id="type-select">
        <option value="basic">Basic Questions (60문항)</option>
        <option value="clinical">Clinical Scenario (20문항)</option>
        <option value="advanced">Advanced Scenario (5문항)</option>
    </select>
    <button class="start-btn" onclick="startQuiz()">시작하기</button>
</div>

<div class="quiz-card" id="quiz-card">
    <div id="progress" style="margin-bottom:15px; color:#888; font-weight:bold;"></div>
    <div class="q-text" id="q-display"></div>
    <div id="options-box"></div>
    <button id="next-btn" onclick="showNext()">다음 문제 ➔</button>
</div>

<script>
    // 85문제 전체 데이터 (PDF 원문 그대로)
    const quizData = {
        basic: [
            { q: "Q1. What is the initial step in the standard flow of procedures for the laboratory diagnosis of infectious diseases?", options: ["A) Susceptibility testing to antimicrobial agents", "B) Growth and cultivation of the agents from the specimens", "C) Direct examination of patient specimens for the presence of etiologic agents", "D) Analysis of cultivated organisms to establish their identification"], a: "C" },
            { q: "Q2. Which of the following is required to achieve optimal resolution at 1000X magnification using a bright-field microscope?", options: ["A) A phase-contrast condenser", "B) Oil immersion", "C) Fluorescent dye", "D) A dark-field ring"], a: "B" },
            { q: "Q3. In the context of light microscopy, how is 'resolving power' defined?", options: ["A) The total magnification achieved by the ocular and objective lenses combined.", "B) The ability to view internal bacterial structures clearly.", "C) The minimum distance between two distinct points that can still be seen as separate.", "D) The degree to which light is bent when passing through a specimen."], a: "C" },
            { q: "Q4. While a typical light microscope has sufficient resolving power to distinguish individual bacterial cells, what is its primary limitation?", options: ["A) It cannot be used with stained specimens.", "B) It is generally insufficient to resolve internal or external bacterial structures.", "C) It cannot magnify beyond 100X.", "D) It requires a vacuum to operate effectively."], a: "B" },
            { q: "Q5. How does the Kinyoun method achieve successful primary stain penetration into the cell without the use of heat?", options: ["A) It uses a stronger acid-alcohol decolorizer", "B) It completely bypasses carbolfuchsin", "C) It utilizes a significantly higher concentration of phenol or carbolfuchsin", "D) It relies on an electromagnetic field"], a: "C" },
            { q: "Q6. Which staining technique is specifically designed to highlight the presence of a waxy mycolic acid layer in the cell wall?", options: ["A) Gram stain", "B) Acid-fast stain", "C) Acridine Orange stain", "D) India Ink preparation"], a: "B" },
            { q: "Q7. What is the primary function of 95% ethanol in the Gram stain procedure?", options: ["A) Primary stain", "B) Mordant", "C) Decolorizer", "D) Counterstain"], a: "C" },
            { q: "Q8. Why does Acridine Orange staining allow for a more rapid screening of specimens compared to Gram staining?", options: ["A) It requires fewer steps and less time to perform.", "B) Bacteria fluoresce brightly against a dark background, making them easier to spot at lower magnifications.", "C) It specifically stains only pathogenic bacteria.", "D) It provides detailed information about the cell wall structure."], a: "B" },
            { q: "Q9. When using the India Ink preparation, why do yeast capsules appear as clear halos against a dark background?", options: ["A) The dye is chemically attracted to the capsule.", "B) The ink particles are too large to penetrate the capsule.", "C) The capsule actively repels the ink through electrostatic forces.", "D) The yeast cells absorb all the ink, leaving the capsule clear."], a: "B" },
            { q: "Q10. Which of the following describes the correct order of reagents in the Gram stain procedure?", options: ["A) Crystal Violet -> Iodine -> Alcohol -> Safranin", "B) Iodine -> Crystal Violet -> Alcohol -> Safranin", "C) Safranin -> Alcohol -> Iodine -> Crystal Violet", "D) Crystal Violet -> Safranin -> Iodine -> Alcohol"], a: "A" }
            // ... (Basic 나머지 50문항과 Clinical/Advanced 문항을 이 자리에 추가)
        ],
        clinical: [
            // 여기에 Clinical Scenario Questions 20문제 추가
        ],
        advanced: [
            // 여기에 Advanced Scenario Questions 5문제 추가
        ]
    };

    let currentQuestions = [];
    let idx = 0;

    function startQuiz() {
        const type = document.getElementById('type-select').value;
        if (!quizData[type] || quizData[type].length === 0) {
            alert("이 섹션의 문제는 현재 데이터 정리 중입니다. Basic부터 풀어보세요!");
            return;
        }
        currentQuestions = [...quizData[type]].sort(() => Math.random() - 0.5);
        idx = 0;
        document.getElementById('quiz-card').style.display = 'block';
        showNext();
    }

    function showNext() {
        if (idx >= currentQuestions.length) {
            alert("축하합니다! 해당 섹션을 모두 완료했습니다.");
            return;
        }
        const item = currentQuestions[idx];
        document.getElementById('progress').innerText = `Question ${idx + 1} of ${currentQuestions.length}`;
        document.getElementById('q-display').innerText = item.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';

        item.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                const all = document.querySelectorAll('.opt-btn');
                all.forEach(b => b.disabled = true);
                if (opt.startsWith(item.a)) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    all.forEach(b => { if(b.innerText.startsWith(item.a)) b.classList.add('correct'); });
                }
                document.getElementById('next-btn').style.display = 'block';
                idx++;
            };
            box.appendChild(btn);
        });
    }
</script>
</body>
</html>
