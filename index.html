<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임상병리 전공 퀴즈 - 미생물 Ch.5</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f5f6fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary); color: white; width: 100%; padding: 15px; text-align: center; font-weight: bold; }
        .menu { background: white; width: 100%; max-width: 600px; padding: 15px; margin-top: 10px; border-radius: 10px; display: flex; gap: 10px; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .quiz-card { background: white; width: 90%; max-width: 600px; padding: 25px; margin-top: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .q-text { font-size: 1.1rem; font-weight: bold; line-height: 1.6; margin-bottom: 20px; }
        .opt-btn { width: 100%; text-align: left; padding: 15px; margin-bottom: 10px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
        .opt-btn:hover { border-color: var(--accent); }
        .opt-btn.correct { background: #2ecc71; color: white; border-color: #27ae60; }
        .opt-btn.wrong { background: #e74c3c; color: white; border-color: #c0392b; }
        #next-btn { display: none; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>🔬 Ch.5 Role of Microscopy Quiz</header>

<div class="menu">
    <select id="level-select">
        <option value="basic">Basic Questions (Q1-Q10)</option>
        <option value="advance">Advance Questions (Q11-Q15)</option>
    </select>
    <button onclick="startQuiz()" style="background:var(--accent); color:white; border:none; padding:5px 15px; border-radius:5px; cursor:pointer;">시작</button>
</div>

<div class="quiz-card" id="quiz-card" style="display:none;">
    <div id="progress" style="margin-bottom:10px; color:#888;"></div>
    <div class="q-text" id="q-display"></div>
    <div id="options-box"></div>
    <button id="next-btn" onclick="showNext()">다음 문제 ➔</button>
</div>

<script>
    const quizData = {
        basic: [
            { q: "Q1. What is the initial step in the standard flow of procedures for the laboratory diagnosis of infectious diseases?", options: ["A) Susceptibility testing", "B) Growth and cultivation", "C) Direct examination of patient specimens", "D) Analysis of cultivated organisms"], a: "C" },
            { q: "Q2. Which of the following is required to achieve optimal resolution at 1000X magnification using a bright-field microscope?", options: ["A) A phase-contrast condenser", "B) Oil immersion", "C) Fluorescent dye", "D) A dark-field ring"], a: "B" },
            { q: "Q3. In the context of light microscopy, how is 'resolving power' defined?", options: ["A) Total magnification", "B) Ability to view internal structures", "C) Minimum distance between two distinct points seen as separate", "D) Degree to which light is bent"], a: "C" },
            { q: "Q4. While a typical light microscope has sufficient resolving power... what is its primary limitation?", options: ["A) It cannot be used with stained specimens.", "B) It is generally insufficient to resolve internal or external bacterial structures.", "C) It cannot magnify beyond 100X.", "D) It requires a vacuum"], a: "B" },
            { q: "Q5. How does the Kinyoun method achieve successful primary stain penetration into the cell without the use of heat?", options: ["A) Stronger acid-alcohol", "B) Bypassing carbolfuchsin", "C) Higher concentration of phenol or carbolfuchsin", "D) Electromagnetic field"], a: "C" },
            { q: "Q7. What is the primary function of 95% ethanol in the Gram stain procedure?", options: ["A) Primary stain", "B) Mordant", "C) Decolorizer", "D) Counterstain"], a: "C" },
            { q: "Q10. Which of the following describes the correct order of reagents in the Gram stain procedure?", options: ["A) Crystal Violet -> Iodine -> Alcohol -> Safranin", "B) Iodine -> Crystal Violet -> Alcohol -> Safranin", "C) Safranin -> Alcohol -> Iodine -> Crystal Violet", "D) Crystal Violet -> Safranin -> Iodine -> Alcohol"], a: "A" }
        ],
        advance: [
            { q: "Q11. A physician suspects a patient has a systemic fungal infection... which of the following is the best choice for rapid screening?", options: ["A) India Ink preparation", "B) Acridine Orange stain", "C) Gram stain", "D) Acid-fast stain"], a: "B" },
            { q: "Q15. ...how does the Kinyoun method achieve successful primary stain penetration into the cell without the use of heat?", options: ["A) Stronger acid-alcohol", "B) Bypassing carbolfuchsin", "C) Higher concentration of phenol or carbolfuchsin", "D) Electromagnetic field"], a: "C" }
        ]
    };

    let currentQuestions = [];
    let idx = 0;

    function startQuiz() {
        const lv = document.getElementById('level-select').value;
        currentQuestions = [...quizData[lv]].sort(() => Math.random() - 0.5);
        idx = 0;
        document.getElementById('quiz-card').style.display = 'block';
        showNext();
    }

    function showNext() {
        if (idx >= currentQuestions.length) { alert("완료!"); return; }
        const item = currentQuestions[idx];
        document.getElementById('progress').innerText = `Q ${idx + 1}/${currentQuestions.length}`;
        document.getElementById('q-display').innerText = item.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';

        item.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                const all = document.querySelectorAll('.opt-btn');
                all.forEach(b => b.disabled = true);
                if(opt.startsWith(item.a)) btn.classList.add('correct');
                else {
                    btn.classList.add('wrong');
                    all.forEach(b => { if(b.innerText.startsWith(item.a)) b.classList.add('correct'); });
                }
                document.getElementById('next-btn').style.display = 'block';
                idx++;
            };
            box.appendChild(btn);
        });
    }
</script>
</body>
</html>
