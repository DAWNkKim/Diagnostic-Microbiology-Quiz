<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임상미생물학 Ch.5 전공 퀴즈 (전체 85문항)</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f5f6fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: var(--primary); color: white; width: 100%; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .setup { background: white; width: 90%; max-width: 700px; padding: 15px; margin-top: 15px; border-radius: 12px; display: flex; gap: 10px; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .quiz-card { background: white; width: 90%; max-width: 700px; padding: 30px; margin-top: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; }
        .q-text { font-size: 1.1rem; font-weight: bold; line-height: 1.6; margin-bottom: 25px; white-space: pre-wrap; }
        .opt-btn { width: 100%; text-align: left; padding: 16px; margin-bottom: 12px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
        .opt-btn:hover { border-color: var(--accent); background: #f1f9ff; }
        .opt-btn.correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .opt-btn.wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }
        #next-btn { display: none; width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        select, button.start-btn { padding: 10px 20px; border-radius: 6px; border: 1px solid #ddd; font-size: 1rem; }
        button.start-btn { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>🔬 Microbiology Ch.5: Role of Microscopy (Full Exam)</header>

<div class="setup">
    <select id="type-select">
        <option value="basic">Basic Questions (60문항)</option>
        <option value="clinical">Clinical Scenario (20문항)</option>
        <option value="advanced">Advanced Scenario (5문항)</option>
    </select>
    <button class="start-btn" onclick="startQuiz()">시작하기</button>
</div>

<div class="quiz-card" id="quiz-card">
    <div id="progress" style="margin-bottom:15px; color:#888; font-weight:bold;"></div>
    <div class="q-text" id="q-display"></div>
    <div id="options-box"></div>
    <button id="next-btn" onclick="showNext()">다음 문제 ➔</button>
</div>

<script>
    // 85문제 전체 데이터 (PDF 원문 그대로)
    const quizData = {
        basic: [
            { q: "Q1. What is the initial step in the standard flow of procedures for the laboratory diagnosis of infectious diseases?", options: ["A) Susceptibility testing to antimicrobial agents", "B) Growth and cultivation of the agents from the specimens", "C) Direct examination of patient specimens for the presence of etiologic agents", "D) Analysis of cultivated organisms to establish their identification"], a: "C" },
            { q: "Q2. Which of the following is required to achieve optimal resolution at 1000X magnification using a bright-field microscope?", options: ["A) A phase-contrast condenser", "B) Oil immersion", "C) Fluorescent dye", "D) A dark-field ring"], a: "B" },
            { q: "Q3. In the context of light microscopy, how is 'resolving power' defined?", options: ["A) The total magnification achieved by the ocular and objective lenses combined.", "B) The ability to view internal bacterial structures clearly.", "C) The minimum distance between two distinct points that can still be seen as separate.", "D) The degree to which light is bent when passing through a specimen."], a: "C" },
            { q: "Q4. While a typical light microscope has sufficient resolving power to distinguish individual bacterial cells, what is its primary limitation?", options: ["A) It cannot be used with stained specimens.", "B) It is generally insufficient to resolve internal or external bacterial structures.", "C) It cannot magnify beyond 100X.", "D) It requires a vacuum to operate effectively."], a: "B" },
            { q: "Q5. How does the Kinyoun method achieve successful primary stain penetration into the cell without the use of heat?", options: ["A) It uses a stronger acid-alcohol decolorizer", "B) It completely bypasses carbolfuchsin", "C) It utilizes a significantly higher concentration of phenol or carbolfuchsin", "D) It relies on an electromagnetic field"], a: "C" },
            { q: "Q6. Which staining technique is specifically designed to highlight the presence of a waxy mycolic acid layer in the cell wall?", options: ["A) Gram stain", "B) Acid-fast stain", "C) Acridine Orange stain", "D) India Ink preparation"], a: "B" },
            { q: "Q7. What is the primary function of 95% ethanol in the Gram stain procedure?", options: ["A) Primary stain", "B) Mordant", "C) Decolorizer", "D) Counterstain"], a: "C" },
            { q: "Q8. Why does Acridine Orange staining allow for a more rapid screening of specimens compared to Gram staining?", options: ["A) It requires fewer steps and less time to perform.", "B) Bacteria fluoresce brightly against a dark background, making them easier to spot at lower magnifications.", "C) It specifically stains only pathogenic bacteria.", "D) It provides detailed information about the cell wall structure."], a: "B" },
            { q: "Q9. When using the India Ink preparation, why do yeast capsules appear as clear halos against a dark background?", options: ["A) The dye is chemically attracted to the capsule.", "B) The ink particles are too large to penetrate the capsule.", "C) The capsule actively repels the ink through electrostatic forces.", "D) The yeast cells absorb all the ink, leaving the capsule clear."], a: "B" },
            { q: "Q10. Which of the following describes the correct order of reagents in the Gram stain procedure?", options: ["A) Crystal Violet -> Iodine -> Alcohol -> Safranin", "B) Iodine -> Crystal Violet -> Alcohol -> Safranin", "C) Safranin -> Alcohol -> Iodine -> Crystal Violet", "D) Crystal Violet -> Safranin -> Iodine -> Alcohol"], a: "A" }
            { q: "Q11. Which of the following stains is considered a 'negative stain'?", options: ["A) Gram stain", "B) India Ink", "C) Acid-fast stain", "D) Acridine Orange"], a: "B" },
            { q: "Q12. The primary purpose of a 'mordant' in staining is to:", options: ["A) Decolorize the specimen", "B) Increase the affinity of the stain for the specimen", "C) Act as a counterstain", "D) Kill the bacteria"], a: "B" },
            { q: "Q13. In the Gram stain, Gram-positive bacteria appear ________ while Gram-negative appear ________.", options: ["A) Pink / Purple", "B) Purple / Pink", "C) Clear / Red", "D) Blue / Green"], a: "B" },
            { q: "Q14. Dark-field microscopy is most often used to visualize which of the following?", options: ["A) Mycobacterium tuberculosis", "B) Treponema pallidum (Syphilis)", "C) Staphylococcus aureus", "D) Escherichia coli"], a: "B" },
            { q: "Q15. The Kinyoun acid-fast stain is also known as the:", options: ["A) Hot stain method", "B) Cold stain method", "C) Fluorescent method", "D) Negative stain method"], a: "B" },
            { q: "Q16. What is the total magnification if a 10X ocular lens is used with a 40X objective lens?", options: ["A) 40X", "B) 100X", "C) 400X", "D) 1000X"], a: "C" },
            { q: "Q17. Which component of the microscope focuses light onto the specimen?", options: ["A) Objective lens", "B) Ocular lens", "C) Condenser", "D) Coarse adjustment knob"], a: "C" },
            { q: "Q18. Acridine Orange is a fluorochrome that binds to:", options: ["A) Peptidoglycan", "B) Mycolic acid", "C) Nucleic acids (DNA/RNA)", "D) Polysaccharide capsules"], a: "C" },
            { q: "Q19. The Ziehl-Neelsen stain requires ________ to facilitate penetration of carbolfuchsin.", options: ["A) Cold phenol", "B) Heat", "C) 95% Ethanol", "D) Iodine"], a: "B" },
            { q: "Q20. Which of the following is the counterstain in the Gram stain procedure?", options: ["A) Crystal Violet", "B) Iodine", "C) Safranin", "D) Methylene Blue"], a: "C" },
            { q: "Q21. Why are Gram-negative bacteria decolorized by alcohol?", options: ["A) They have a thick peptidoglycan layer.", "B) The alcohol dissolves the outer lipid-rich membrane.", "C) They lack DNA.", "D) They are acid-fast."], a: "B" },
            { q: "Q22. The ability of a microscope to stay in focus when switching objectives is called:", options: ["A) Resolution", "B) Parfocal", "C) Refraction", "D) Magnification"], a: "B" },
            { q: "Q23. Which microscope uses an electron beam instead of light?", options: ["A) Bright-field", "B) Electron microscope", "C) Phase-contrast", "D) Fluorescence"], a: "B" },
            { q: "Q24. Calcofluor White is used primarily to detect:", options: ["A) Bacteria", "B) Fungi", "C) Viruses", "D) Parasites"], a: "B" },
            { q: "Q25. Gram's Iodine acts as a:", options: ["A) Primary stain", "B) Mordant", "C) Decolorizer", "D) Counterstain"], a: "B" },
            { q: "Q26. A common decolorizer in the acid-fast stain is:", options: ["A) 95% Ethanol", "B) Acid-alcohol", "C) Water", "D) Acetone"], a: "B" },
            { q: "Q27. Fluorescent microscopes use ________ as a light source.", options: ["A) Visible light", "B) Ultraviolet (UV) light", "C) Infrared light", "D) Laser only"], a: "B" },
            { q: "Q28. The primary stain in the Kinyoun method is:", options: ["A) Methylene Blue", "B) Carbolfuchsin", "C) Safranin", "D) Malachite Green"], a: "B" },
            { q: "Q29. What color do acid-fast bacilli (AFB) appear after staining?", options: ["A) Blue", "B) Red/Pink", "C) Purple", "C) Green"], a: "B" },
            { q: "Q30. Which of the following is used to stain Corynebacterium diphtheriae granules?", options: ["A) Gram stain", "B) Methylene Blue", "C) India Ink", "D) Acid-fast stain"], a: "B" },
            { q: "Q31. Refractive index refers to:", options: ["A) The size of the lens", "B) The degree of light bending", "C) The brightness of the bulb", "D) The color of the stain"], a: "B" },
            { q: "Q32. Phase-contrast microscopy is best for viewing:", options: ["A) Killed bacteria", "B) Living, unstained cells", "C) Viruses", "D) Stained smears"], a: "B" },
            { q: "Q33. Which of these is NOT a step in the Gram stain?", options: ["A) Heat fixing", "B) Decolorizing with acid-alcohol", "C) Applying a mordant", "D) Counterstaining"], a: "B" },
            { q: "Q34. The resolution of a standard light microscope is approximately:", options: ["A) 0.2 mm", "B) 0.2 μm", "C) 2.0 nm", "D) 20 μm"], a: "B" },
            { q: "Q35. Auramine-Rhodamine is a ________ stain used for AFB.", options: ["A) Gram", "B) Fluorescent", "C) Negative", "D) Simple"], a: "B" },
            { q: "Q36. Which type of microscopy is best for visualizing very thin organisms like Treponema pallidum that are below the resolution of bright-field microscopy?", options: ["A) Phase-contrast", "B) Dark-field", "C) Fluorescence", "D) Electron"], a: "B" },
            { q: "Q37. The 'stipple' or 'granules' seen in certain bacteria like Corynebacterium are often highlighted using:", options: ["A) India Ink", "B) Methylene blue", "C) Acid-fast stain", "D) Calcofluor white"], a: "B" },
            { q: "Q38. What is the role of the condenser in a light microscope?", options: ["A) Magnify the image", "B) Focus light onto the specimen", "C) Regulate the intensity of light", "D) Move the stage up and down"], a: "B" },
            { q: "Q39. Which of the following is an example of a fluorochrome used for bacteria?", options: ["A) Crystal violet", "B) Safranin", "C) Acridine orange", "D) Iodine"], a: "C" },
            { q: "Q40. Immersion oil has a refractive index similar to:", options: ["A) Air", "B) Glass", "C) Water", "D) Cedar wood oil only"], a: "B" },
            { q: "Q41. In the Ziehl-Neelsen method, what is used to drive the stain into the waxy cell wall?", options: ["A) Cold phenol", "B) Heat", "C) Concentrated alcohol", "D) Detergent"], a: "B" },
            { q: "Q42. Which color do non-acid-fast organisms appear in a Kinyoun stain?", options: ["A) Red", "B) Blue", "C) Green", "D) Colorless"], a: "B" },
            { q: "Q43. The primary stain in the Gram stain procedure is:", options: ["A) Safranin", "B) Iodine", "C) Crystal violet", "D) Alcohol"], a: "C" },
            { q: "Q44. What is the mordant in the Gram stain?", options: ["A) Crystal violet", "B) Safranin", "C) Gram's iodine", "D) 95% Ethanol"], a: "C" },
            { q: "Q45. Malachite green is used as a counterstain in which procedure?", options: ["A) Gram stain", "B) Acid-fast stain", "C) Spore stain", "D) Capsule stain"], a: "C" },
            { q: "Q46. Which of the following is used to detect fungal elements by binding to chitin?", options: ["A) Acridine orange", "B) Calcofluor white", "C) India ink", "D) Methylene blue"], a: "B" },
            { q: "Q47. If the specimen is not heat-fixed properly before staining, what will happen?", options: ["A) It will stain too dark.", "B) The cells will wash off the slide during the procedure.", "C) The cells will burst.", "D) No changes will occur."], a: "B" },
            { q: "Q48. Gram-negative bacteria have a high content of ________ in their cell walls.", options: ["A) Peptidoglycan", "B) Lipids", "C) Teichoic acid", "D) Chitin"], a: "B" },
            { q: "Q49. Which microscope is used to see viruses?", options: ["A) Dark-field", "B) Fluorescence", "C) Electron", "D) Phase-contrast"], a: "C" },
            { q: "Q50. Excessive heat during the fixing process may result in:", options: ["A) Better contrast", "B) Distortion of the organism's morphology", "C) Faster staining time", "D) Removal of the waxy layer"], a: "B" },
            { q: "Q51. The ability to distinguish between two closely spaced objects is:", options: ["A) Magnification", "B) Resolution", "C) Refraction", "D) Contrast"], a: "B" },
            { q: "Q52. Which lens is also known as the 'eye-piece'?", options: ["A) Objective", "B) Ocular", "C) Condenser", "D) Diaphragm"], a: "B" },
            { q: "Q53. A 100X objective lens is typically used with:", options: ["A) Water", "B) Air", "C) Oil", "D) Alcohol"], a: "C" },
            { q: "Q54. The light source for a fluorescence microscope is usually a:", options: ["A) Tungsten bulb", "B) Mercury vapor or Xenon lamp", "C) LED only", "D) Sunlight"], a: "B" },
            { q: "Q55. As the magnification of the objective lens increases, the working distance:", options: ["A) Increases", "B) Decreases", "C) Remains the same", "D) Becomes zero"], a: "B" },
            { q: "Q56. What is the total magnification when using a 10X ocular and a 10X objective?", options: ["A) 20X", "B) 100X", "C) 1000X", "D) 10X"], a: "B" },
            { q: "Q57. Which stain is used to visualize the capsule of Cryptococcus neoformans?", options: ["A) Gram stain", "B) India ink", "C) Acid-fast stain", "D) Methylene blue"], a: "B" },
            { q: "Q58. The background in a dark-field microscope appears:", options: ["A) White", "B) Black", "C) Blue", "D) Green"], a: "B" },
            { q: "Q59. The primary stain used in the Ziehl-Neelsen and Kinyoun methods is:", options: ["A) Methylene blue", "B) Crystal violet", "C) Carbolfuchsin", "D) Safranin"], a: "C" },
            { q: "Q60. Direct examination of a clinical specimen can provide information about:", options: ["A) The exact species of the pathogen", "B) The quality of the specimen and presumptive diagnosis", "C) The antibiotic sensitivity of the organism", "D) The viral load of the patient"], a: "B" }
        ],
        clinical: [
            // 여기에 Clinical Scenario Questions 20문제 추가
        ],
        advanced: [
            // 여기에 Advanced Scenario Questions 5문제 추가
        ]
    };

    let currentQuestions = [];
    let idx = 0;

    function startQuiz() {
        const type = document.getElementById('type-select').value;
        if (!quizData[type] || quizData[type].length === 0) {
            alert("이 섹션의 문제는 현재 데이터 정리 중입니다. Basic부터 풀어보세요!");
            return;
        }
        currentQuestions = [...quizData[type]].sort(() => Math.random() - 0.5);
        idx = 0;
        document.getElementById('quiz-card').style.display = 'block';
        showNext();
    }

    function showNext() {
        if (idx >= currentQuestions.length) {
            alert("축하합니다! 해당 섹션을 모두 완료했습니다.");
            return;
        }
        const item = currentQuestions[idx];
        document.getElementById('progress').innerText = `Question ${idx + 1} of ${currentQuestions.length}`;
        document.getElementById('q-display').innerText = item.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';

        item.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                const all = document.querySelectorAll('.opt-btn');
                all.forEach(b => b.disabled = true);
                if (opt.startsWith(item.a)) {
                    btn.classList.add('correct');
                } else {
                    btn.classList.add('wrong');
                    all.forEach(b => { if(b.innerText.startsWith(item.a)) b.classList.add('correct'); });
                }
                document.getElementById('next-btn').style.display = 'block';
                idx++;
            };
            box.appendChild(btn);
        });
    }
</script>
</body>
</html>
